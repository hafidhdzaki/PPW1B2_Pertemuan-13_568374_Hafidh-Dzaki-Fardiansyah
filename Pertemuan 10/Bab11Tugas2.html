<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Praktikan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <div id="tabel">
                    
                </div>
            </div>
        </div>
    </div>
    <script>
        let cek = confirm("Apakah Anda praktikan PPW1?");
        let isi = document.getElementById("tabel");

        if (cek) {
            let nama = prompt("Masukkan nama Anda");
            let nim = prompt("Masukkan nim Anda");
            let angkatan = prompt("Masukkan angkatan berapa Anda");
            
            isi.innerHTML = `
                    <table class="table mt-5">
                        <thead class="table-primary">
                            <tr>
                                <th>Nama</th>
                                <th>NIM</th>
                                <th>Angkatan</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${nama}</td>
                                <td>${nim}</td>
                                <td>${angkatan}</td>
                            </tr>
                        </tbody>
                    </table>
                `;
        } else {
            isi.innerHTML = `
                <p>Anda bukan praktikan PPW1, anda tidak boleh masuk!</p>
            `;
        }
    </script>
</body>
</html>
