<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .calculator {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 320px;
        }

        .display {
            width: 100%;
            height: 80px;
            background-color: #f8f9fa;
            border: none;
            border-radius: 12px;
            text-align: right;
            padding: 20px;
            font-size: 2.5rem;
            margin-bottom: 24px;
            color: #333;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 16px;
            font-size: 1.3rem;
            border: none;
            border-radius: 12px;
            background-color: #f1f3f5;
            color: #333;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        button.operator {
            background-color: #e3f2fd;
            color: #0d6efd;
            font-weight: 600;
        }

        button.equal {
            background-color: #0d6efd;
            color: white;
            grid-column: span 2;
        }
        button.equal:hover {
            background-color: #0b5ed7;
        }

        button.clear {
            background-color: #fee1e8;
            color: #dc3545;
            grid-column: span 2;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="layar" disabled value="0">

        <div class="buttons">
            <button class="clear" onclick="bersihkanLayar()">AC</button>
            <button class="operator" onclick="hapus()">⌫</button>
            <button class="operator" onclick="pilihOperator('/')">÷</button>

            <button onclick="tambahAngka('7')">7</button>
            <button onclick="tambahAngka('8')">8</button>
            <button onclick="tambahAngka('9')">9</button>
            <button class="operator" onclick="pilihOperator('*')">×</button>

            <button onclick="tambahAngka('4')">4</button>
            <button onclick="tambahAngka('5')">5</button>
            <button onclick="tambahAngka('6')">6</button>
            <button class="operator" onclick="pilihOperator('-')">-</button>

            <button onclick="tambahAngka('1')">1</button>
            <button onclick="tambahAngka('2')">2</button>
            <button onclick="tambahAngka('3')">3</button>
            <button class="operator" onclick="pilihOperator('+')">+</button>

            <button onclick="tambahAngka('0')">0</button>
            <button onclick="tambahAngka('.')">.</button>
            <button class="equal" onclick="hitungHasil()">=</button>
        </div>
    </div>

    <script>
        let layar = document.getElementById('layar');

        function tambahAngka(angka){
            let lihat = layar.value;
            if (layar.value == "0"){
                layar.value = angka;
            } else if (lihat.at(-1) == '.' && angka == '.') {
                layar.value = lihat;
            } else {
                layar.value += angka;
            }
        };

        function pilihOperator(op){
            let back = layar.value;
            if (layar.value == "0") {
                layar.value = "0";
            } else if (['-', '+', '*', '/'].includes(back.at(-1))) {
                layar.value = back;
            } else {
                layar.value = layar.value + op;
            }
        };

        function hitungHasil(){
            layar.value = eval(layar.value);
        }

        function bersihkanLayar(){
            layar.value = 0;
        }

        function hapus(){
            let isilayar = layar.value;
            if (isilayar.length > 1){
                layar.value = isilayar.slice(0, -1);
            } else {
                layar.value = "0";
            }
        }
    </script>
</body>
</html>
