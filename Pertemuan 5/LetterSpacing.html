<!DOCTYPE html>
<html>
<head>
<style>
  .normal { letter-spacing: normal; }
  .lebar { letter-spacing: 5px; }
  .rapat { letter-spacing: -1.5px; }
</style>
</head>
<body>

  <h3>1. Jarak Normal</h3>
  <p class="normal">Ini adalah teks dengan jarak huruf standar.</p>

  <h3>2. Jarak Positif (5px)</h3>
  <p class="lebar">TEKS INI TERLIHAT LEBIH ELEGAN DAN MELEBAR.</p>

  <h3>3. Jarak Negatif (-1.5px)</h3>
  <p class="rapat">Teks ini terlihat lebih padat dan rapat antar hurufnya.</p>

</body>
</html>
