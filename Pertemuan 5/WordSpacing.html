<!DOCTYPE html>
<html>
<head>
<style>
  .normal { word-spacing: normal; }
  .lebar { word-spacing: 15px; }
  .rapat { word-spacing: -5px; }
</style>
</head>
<body>

  <h3>1. Jarak Kata Normal</h3>
  <p class="normal">Ini adalah contoh jarak antar kata yang standar.</p>

  <h3>2. Jarak Kata Positif (15px)</h3>
  <p class="lebar">Setiap kata di sini memiliki jarak yang lebih jauh.</p>

  <h3>3. Jarak Kata Negatif (-5px)</h3>
  <p class="rapat">Kata-kata ini terlihat sangat rapat satu sama lain.</p>

</body>
</html>
