<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation & Transition</title>
    <style>
        :root {
            --halaman-utama: #0a0a0a;
            --teks-inti: white;
            --border-merah: #e53935;
            --loading: #1a1a1a;
            --teks-sekunder: #9e9e9e;
            --merah-sekunder: #ff5252;
            --border-melayang: #333333;
            --shadow-melayang: rgba(229, 57, 53, 0.3);
            --border-membesar: rgba(255, 255, 255, 0.795);
        }

        * {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        body {
            background-color: var(--halaman-utama);
            color: var(--teks-inti);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 830px;
            justify-items: center;
        }

        @keyframes muncul {
            0% {opacity: 0; transform: translateY(30px)}
            100% {opacity: 1; transform: translateY(0);}
        }

        header {
            animation: muncul 2s ease-in-out forwards;
            opacity: 0;
            margin: 50px;
        }


        main, .status, .interaksi, .paket {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status h2, .interaksi h2, .paket h2 {
            width: 100%;
            text-align: center;
            padding: 10px;
            border-bottom: 2px solid var(--border-merah);
        }
        
        .status p {
            margin: 20px;
            color: var(--teks-sekunder);
            font-size: medium;
        }
        
        .loading {
            width: 50px;
            height: 50px;
            border-top: var(--border-merah) solid;
            border-left: var(--loading) solid;
            border-right: var(--loading) solid;
            border-bottom: var(--loading) solid;
            border-radius: 100px;
            border-width: 6px;
            margin-bottom: 50px;
            animation: muter 1s linear infinite;
        }

        @keyframes muter {
            0% {transform: rotate(0deg);}
            100% {transform: rotate(360deg);}
        }

        .tombol {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 50px;
        }
        
        .tombol button {
            font-size: medium;
            font-weight: 600;
            padding: 16px 30px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .Glow {
            color: var(--teks-inti);
            border-style: none;
            background-color: var(--border-merah);
            transition: 0.3s ease;
        }

        .Glow:hover {
            background-color: var(--merah-sekunder);
            box-shadow: 0 0 20px var(--border-merah);
            transition: 0.3s ease;
        }
        
        .Melayang {
            background-color: var(--loading);
            border-style: solid;
            border-color: var(--border-melayang);
            border-width: 2px;
            transition: 0.25s ease;
            color: var(--teks-inti);
            transition: 0.3s ease;
        }

        .Melayang:hover {
            border-color: var(--border-merah);
            box-shadow: 0 10px 15px var(--shadow-melayang);
            transform: translateY(-8px);
            transition: 0.3s ease;
        }

        .Membesar {
            border-style: none;
            background-color: var(--teks-sekunder);
            color: var(--halaman-utama);
            transition: 0.3s ease;
        }

        .Membesar:hover {
            color: var(--teks-inti);
            background-color: var(--halaman-utama);
            font-size: larger;
            border-style: solid;
            border-width: 2px;
            border-color: var(--border-membesar);
            transform: scale(5px);
            transition: 0.3s ease;
        }

        .card {
            width: 300px;
            height: 400px;
            perspective: 1000px;
            transform-style: preserve-3d;
            position: relative;
            margin-bottom: 70px;
        }

        .card1 {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--loading);
            border-color: var(--border-melayang);
            border-style: solid;
            border-width: 2px;
            border-radius: 10px;
            margin-top: 20px;
            position: absolute;
            backface-visibility: hidden;
            transition: 0.8s;
        }
        
        .card1 h1, .card1 h3, .card1 p {
            background-color: var(--loading);
        }
        
        .card1 h1 {
            font-size: 500%;
            margin-bottom: 20px;
        }
        
        .card1 h3 {
            font-size: 150%;
        }
        
        .card1 p {
            margin-top: 10px;
            color: var(--teks-sekunder);
        }
        
        .card2 {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--border-merah);
            border-color: var(--merah-sekunder);
            border-style: solid;
            border-width: 2px;
            border-radius: 10px;
            margin-top: 20px;
            position: absolute;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            transition: 0.8s;
        }
        
        .card2 h4, .card2 ul, .card2 ul li {
            background-color: var(--border-merah);
            padding: 5px;
        }

        .card2 h4 {
            font-size: 130%;
        }

        .card2 ul li {
            font-weight: 700;
        }

        .card:hover .card1 {
            transform: rotateY(180deg);
        }

        .card:hover .card2 {
            transform: rotateY(360deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SELAMAT DATANG DI SUPERSET</h1>
        </header>
        <main>
            <section class="status">
                <h2>STATUS SISTEM</h2>
                <p>Mencari Personal Trainer terdekat...</p>
                <div class="loading"></div>
            </section>
            <section class="interaksi">
                <h2>INTERAKSI TOMBOL</h2>
                <section class="tombol">
                    <button class="Glow">Efek Glow</button>
                    <button class="Melayang">Efek Melayang</button>
                    <button class="Membesar">Efek Membesar</button>
                </section>
            </section>
            <section class="paket">
                <h2>PAKET VIP</h2>
                <section class="card">
                    <section class="card1">
                        <h1>💎</h1>
                        <h3>Paket VIP</h3>
                        <p>Cek Keuntungan</p>
                    </section>
                    <section class="card2">
                        <h4>Keuntungan VIP</h4>
                        <ul>
                            <li>Akses gym 24/7</li>
                            <li>Gratis 5x Personal Trainer</li>
                            <li>Akses sauna & kolam renang</li>
                            <li>Diskon Suplemen 20%</li>
                        </ul>
                    </section>
                </section>
            </section>
        </main>
    </div>
</body>
</html>
