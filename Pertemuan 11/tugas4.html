<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kalkulator Sederhana JS</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                background-color: #f9fafb;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                color: #1f2937;
            }

            .card {
                background-color: #ffffff;
                width: 100%;
                max-width: 350px;
                padding: 32px;
                border-radius: 16px;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
                border: 1px solid #f3f4f6;
            }

            h2 {
                font-size: 1.25rem;
                font-weight: 600;
                margin-bottom: 24px;
                text-align: center;
                color: #111827;
            }

            .input-group {
                margin-bottom: 16px;
            }

            label {
                display: block;
                font-size: 0.875rem;
                font-weight: 500;
                margin-bottom: 8px;
                color: #4b5563;
            }

            input {
                width: 100%;
                padding: 12px;
                font-size: 1rem;
                border: 1px solid #d1d5db;
                border-radius: 8px;
                background-color: #f9fafb;
                outline: none;
                transition: border-color 0.2s;
            }

            input:focus {
                border-color: #111827;
            }

            .button-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-top: 24px;
            }

            button {
                padding: 12px;
                background-color: #111827;
                color: #ffffff;
                border: none;
                border-radius: 8px;
                font-size: 1.1rem;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.2s ease;
            }

            button:hover {
                background-color: #374151;
            }

            .result-area {
                margin-top: 24px;
                padding: 16px;
                background-color: #f3f4f6;
                border-radius: 8px;
                text-align: center;
                font-size: 1.1rem;
                font-weight: 500;
            }

            .hasil-angka {
                display: block;
                font-size: 2rem;
                font-weight: 700;
                color: #111827;
                margin-top: 8px;
            }
        </style>
    </head>
    <body>

        <div class="card">
            <h2>Kalkulator JS</h2>
            
            <div class="input-group">
                <label for="angka1">Bilangan Pertama</label>
                <input type="number" id="angka1" placeholder="0">
            </div>

            <div class="input-group">
                <label for="angka2">Bilangan Kedua</label>
                <input type="number" id="angka2" placeholder="0">
            </div>

            <div class="button-grid">
                <button id="btn-tambah" onclick="penjumlahan()">Tambah (+)</button>
                <button id="btn-kurang" onclick="pengurangan()">Kurang (-)</button>
                <button id="btn-kali" onclick="perkalian()">Kali (x)</button>
                <button id="btn-bagi" onclick="pembagian()">Bagi (/)</button>
            </div>

            <div class="result-area">
                Hasil Perhitungan:
                <span class="hasil-angka" id="hasil"></span>
            </div>
        </div>
        <script>
            let tampil = document.getElementById('hasil');
            let angka1, angka2;
            let hasil = 0;
            tampil.innerHTML = 0;
            
            function penjumlahan(){
                angka1 = Number(document.getElementById('angka1').value);
                angka2 = Number(document.getElementById('angka2').value);
                hasil = angka1 + angka2;
                tampil.innerHTML = hasil;
            }
            
            function pengurangan(){
                angka1 = Number(document.getElementById('angka1').value);
                angka2 = Number(document.getElementById('angka2').value);
                hasil = angka1 - angka2;
                tampil.innerHTML = hasil;
            }
            
            function pembagian(){
                angka1 = Number(document.getElementById('angka1').value);
                angka2 = Number(document.getElementById('angka2').value);
                hasil = angka1/angka2;
                tampil.innerHTML = hasil;
            }
            
            function perkalian(){
                angka1 = Number(document.getElementById('angka1').value);
                angka2 = Number(document.getElementById('angka2').value);
                hasil = angka1*angka2;
                tampil.innerHTML = hasil;
            }
        </script>
    </body>
</html>
